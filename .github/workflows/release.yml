name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-www:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build web UI
        working-directory: apps/cli/www
        run: npm ci && npm run build

      - name: Package web UI
        run: cd apps/cli/www/dist && tar czf ../../../../trivia-www.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: trivia-www.tar.gz
          path: trivia-www.tar.gz

  build:
    needs: build-www
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: trivia-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: trivia-aarch64-unknown-linux-gnu.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: trivia-aarch64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: trivia-x86_64-pc-windows-msvc.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/download-artifact@v4
        with:
          name: trivia-www.tar.gz

      - name: Extract web UI
        run: mkdir -p apps/cli/www/dist && tar xzf trivia-www.tar.gz -C apps/cli/www/dist

      - name: Build release binary
        run: cargo build --release -p trivia-cli

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/trivia dist/
          cd dist
          tar czf ../${{ matrix.artifact }} trivia

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/release/trivia.exe dist/
          Compress-Archive -Path dist/trivia.exe -DestinationPath ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
